# Default configuration for OpenBridge

server:
  host: 0.0.0.0
  port: 8080
  workers: 1
  reload: false
  log_level: INFO

security:
  jwt_secret: ${JWT_SECRET:-auto-generated}
  session_timeout: 3600
  max_sessions_per_user: 3
  allowed_commands:
    - "*"
  blocked_commands:
    - "rm -rf /"
    - "mkfs.*"
    - "dd if=/dev/zero"
  require_auth: true
  encryption_enabled: false

adapters:
  telegram:
    enabled: false
    bot_token: ${TELEGRAM_BOT_TOKEN}
    allowed_users: []
    webhook_url: null
    polling_timeout: 30
  
  discord:
    enabled: false
    bot_token: ${DISCORD_BOT_TOKEN}
    guild_id: null
    allowed_roles: []
    command_prefix: "!"
  
  whatsapp:
    enabled: false
    session_path: ".whatsapp_session"
    webhook_url: null

redis:
  enabled: false
  host: localhost
  port: 6379
  db: 0
  password: null

features:
  file_transfer: true
  session_persistence: true
  auto_cleanup: true
  rate_limiting:
    enabled: true
    commands_per_minute: 30
    messages_per_second: 5
    burst_size: 10

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: null
  max_bytes: 10485760
  backup_count: 5

data_dir: ~/.openbridge
